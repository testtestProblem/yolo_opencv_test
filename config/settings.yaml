# 雙模型配置
models:
  person:
    path: "best_20260628.pt"
    conf_threshold: 0.4
    iou_threshold: 0.45
    imgsz: 640
    target_class: person
    tracker: "bytetrack.yaml"
    class_map:
      person: person

  ppe:
    path: "best_20260628.pt"
    conf_threshold: 0.5
    iou_threshold: 0.45
    imgsz: 640
    class_map:
      hard-hat: helmet
      safety-vest: reflective_vest

# person 幾何過濾
filters:
  min_person_height: 30
  max_area_ratio: 0.7
  max_aspect_ratio: 1.5

# PPE 關聯：裝備中心點落在該工人 person 框內（Head/Torso ROI 僅供視覺化）
association:
  method: center_in_person_box
  head_ratio: 0.333
  torso_ratio: 0.5

# 時序確認：滑動窗口 + 命中門檻 + 離場清理
temporal:
  window_size: 120
  confirm_threshold: 100        # person 確認門檻
  ppe_confirm_threshold: 80     # 安全帽 / 反光背心確認門檻
  max_missed_frames: 300

ui:
  window_title: "工人 PPE 合規偵測"
  timer_interval_ms: 30
  display_min_width: 640
  display_min_height: 480
  panel_width: 320

visualizer:
  box_thickness: 2
  text_scale: 0.6
  colors:
    compliant: [0, 255, 0]
    violation: [0, 0, 255]
    ppe: [255, 191, 0]
    person_only: [0, 165, 255]
    head_roi: [255, 255, 0]
    torso_roi: [255, 0, 255]
