# 模型配置
models:
  base:
    path: "models/yolo26m.pt"
    conf: 0.4
    target_classes: [0]       # COCO 的 person 類別
  ppe:
    path: "models/best_v2.pt"
    conf: 0.5
    # 這裡對齊你 best_v2.pt 訓練時的 class id
    # 假設 0: hard-hat, 1: safety-vest
    target_classes: [0, 1]    

# 類別對齊對照表 (統一對齊到自訂的 ID)
class_map:
  0: "person"
  1: "hard-hat"
  2: "safety-vest"

# 工安合規邏輯參數
compliance:
  iou_threshold: 0.3          # 人與 PPE 的最小重疊度
  check_helmet: true
  check_vest: true

# 視覺化 UI 設定
visualizer:
  box_thickness: 2
  text_scale: 0.6
  colors:
    safe: [0, 255, 0]         # 綠色：合規
    violation: [0, 0, 255]    # 紅色：違規
    ppe: [255, 191, 0]        # 藍色/天藍：單獨的 PPE 物件